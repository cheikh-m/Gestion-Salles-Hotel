<!DOCTYPE html> 
<html lang='fr'> 
<head> 
  <meta charset='UTF-8'> 
  <meta name='viewport' content='width=device-width, initial-scale=1.0'> 
  <title>Gestion des Salles — Hôtel</title> 
  
  <!-- FullCalendar CSS --> 
  <link 
href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' 
rel='stylesheet'> 
  
  <style> 
    * { margin: 0; padding: 0; box-sizing: border-box; } 
    body { font-family: Arial, sans-serif; background: #f0f4f8; } 
  
    .header { 
      background: #0A1628; color: white; 
      padding: 16px 24px; display: flex; 
      justify-content: space-between; align-items: center; 
    } 
    .header h1 { font-size: 20px; } 
    .header span { color: #C9A84C; font-size: 14px; } 
  
    .container { display: flex; gap: 20px; padding: 20px; } 
  
    /* Panneau gauche : liste des salles */ 
    .sidebar { 
      width: 220px; min-width: 220px; 
      background: white; border-radius: 8px; 
      padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.1); 
    } 
    .sidebar h2 { font-size: 14px; color: #6B7280; margin-bottom: 12px; } 
    .salle-btn { 
      width: 100%; padding: 10px 14px; margin-bottom: 6px; 
      border: 2px solid #E5E7EB; border-radius: 6px; 
        background: white; cursor: pointer; text-align: left; 
      font-size: 14px; transition: all .2s; 
    } 
    .salle-btn.active { background: #0A1628; color: white; border-color: #C9A84C; 
} 
    .salle-btn:hover  { border-color: #1A3A6B; } 
  
    /* Zone calendrier */ 
    .calendar-zone { 
      flex: 1; background: white; border-radius: 8px; 
      padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.1); 
    } 
  
    /* Modal réservation */ 
    .modal-overlay { 
      display: none; position: fixed; inset: 0; 
      background: rgba(0,0,0,.5); z-index: 1000; 
      justify-content: center; align-items: center; 
    } 
    .modal-overlay.open { display: flex; } 
    .modal { 
      background: white; border-radius: 12px; 
      padding: 28px; width: 400px; max-width: 90vw; 
    } 
    .modal h3 { margin-bottom: 16px; color: #0A1628; } 
    .form-group { margin-bottom: 14px; } 
    .form-group label { display: block; font-size: 13px; color: #6B7280; margin-bottom: 4px; } 
    .form-group input { 
      width: 100%; padding: 8px 12px; border: 1.5px solid #D1D5DB; 
      border-radius: 6px; font-size: 14px; 
    } 
    .btn-primary { 
      background: #0A1628; color: white; border: none; 
      padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; 
    } 
    .btn-secondary { 
      background: #F3F4F6; color: #374151; border: 1.5px solid #D1D5DB; 
      padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; 
margin-left: 8px; 
    } 
    .btn-danger { 
      background: #DC2626; color: white; border: none; 
      padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; 
margin-left: 8px; 
    } 
  </style> 
</head> 
 
<body> 
  <!-- En-tête --> 
  <div class='header'> 
    <h1>Gestion des Salles de Réunion</h1> 
    <span id='salle-active'>Aucune salle sélectionnée</span> 
  </div> 
  
  <div class='container'> 
    <!-- Sidebar salles -->
      <div class='sidebar'> 
      <h2>SALLES</h2> 
      <div id='liste-salles'></div> 
    </div> 
  
    <!-- Calendrier --> 
    <div class='calendar-zone'> 
      <div id='calendrier'></div> 
    </div> 
  </div> 
  
  <!-- Modal d'ajout/modification --> 
  <div class='modal-overlay' id='modal'> 
    <div class='modal'> 
      <h3 id='modal-titre'>Nouvelle réservation</h3> 
      <input type='hidden' id='reservation-id'> 
      <div class='form-group'> 
        <label>Titre de la réunion *</label> 
        <input type='text' id='input-titre' placeholder='ex: Réunion DG'> 
      </div> 
      <div class='form-group'> 
        <label>Début *</label> 
        <input type='datetime-local' id='input-debut'> 
      </div> 
      <div class='form-group'> 
        <label>Fin *</label> 
        <input type='datetime-local' id='input-fin'> 
      </div> 
      <div class='form-group'> 
        <label>Organisateur</label> 
        <input type='text' id='input-organisateur' placeholder='Nom'> 
      </div> 
      <div> 
        <button class='btn-primary' onclick='sauvegarder()'>Enregistrer</button> 
        <button class='btn-secondary' onclick='fermerModal()'>Annuler</button> 
        <button class='btn-danger' id='btn-supprimer' style='display:none' 
onclick='supprimer()'>Supprimer</button> 
      </div> 
    </div> 
  </div> 
  
  <!-- FullCalendar JS --> 
  <script 
src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script> 
  <script src='admin.js'></script> 
</body>
</html>
