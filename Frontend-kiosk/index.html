<!DOCTYPE html> 
<html lang='fr'> 
<head> 
  <meta charset='UTF-8'> 
  <meta name='viewport' content='width=device-width, initial-scale=1.0'> 
  <title>Affichage Salle</title> 
  <style> 
    /* Styles pour un affichage lisible à 2-3 mètres de distance */ 
    * { margin:0; padding:0; box-sizing:border-box; } 
    body { 
      font-family: Arial, sans-serif; 
      background: #0A1628; color: white; 
      min-height: 100vh; display: flex; 
      flex-direction: column; 
    } 
  
    /* En-tête : nom de la salle + horloge */ 
    .header { 
      background: #C9A84C; color: #0A1628; 
      padding: 20px 32px; display: flex; 
      justify-content: space-between; align-items: center; 
    } 
    .salle-nom  { font-size: 32px; font-weight: bold; } 
    .horloge    { font-size: 36px; font-weight: bold; } 
    .date-ligne { font-size: 16px; text-align: right; } 
  
    /* Zone principale : réunion en cours */ 
    .en-cours { 
      flex: 1; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; 
      padding: 32px; text-align: center; 
    }
     .badge-statut { 
      display: inline-block; padding: 8px 24px; 
      border-radius: 100px; font-size: 16px; font-weight: bold; 
      margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; 
    } 
    .badge-occupee  { background: #b50e0e; } 
    .badge-libre    { background: #0d873a; } 
    .badge-bientot  { background: #bf6b0b; } 
  
    .titre-reunion  { font-size: 52px; font-weight: bold; margin-bottom: 12px; } 
    .horaires       { font-size: 28px; color: #C9A84C; margin-bottom: 8px; } 
    .organisateur   { font-size: 20px; color: #d1dbed; } 
  
    /* Zone suivante : prochains événements */ 
    .prochains { 
      background: #1A3A6B; padding: 20px 32px; 
    } 
    .prochains h3 { 
      font-size: 16px; color: #C9A84C; text-transform: uppercase; 
      letter-spacing: 2px; margin-bottom: 14px; 
    } 
    .prochain-item { 
      display: flex; justify-content: space-between; 
      padding: 10px 0; border-top: 1px solid rgba(255,255,255,.1); 
      font-size: 18px; 
    } 
    .prochain-heure { color: #C9A84C; font-weight: bold; min-width: 120px; } 
  
    /* Barre de progression */ 
    .barre-progression { 
      height: 6px; background: rgba(255,255,255,.1); 
    } 
    .barre-fill { 
      height: 100%; background: #C9A84C; 
      transition: width 1s linear; 
    } 
  
    /* Message hors ligne */ 
    .hors-ligne { 
      display: none; position: fixed; bottom: 20px; left: 50%; 
      transform: translateX(-50%); 
      background: #DC2626; color: white; 
      padding: 10px 24px; border-radius: 8px; font-size: 16px; 
    } 
    .hors-ligne.visible { display: block; } 
  </style> 
</head> 
<body> 
  <!-- En-tête --> 
  <div class='header'> 
    <div class='salle-nom' id='nom-salle'>Chargement...</div> 
    <div> 
      <div class='horloge' id='horloge'>--:--</div> 
      <div class='date-ligne' id='date-ligne'>--</div> 
    </div> 
  </div>
    <!-- Barre de progression de la réunion en cours --> 
  <div class='barre-progression'><div class='barre-fill' id='barre' 
style='width:0%'></div></div> 
  
  <!-- Zone réunion en cours --> 
  <div class='en-cours'> 
    <div class='badge-statut badge-libre' id='badge'>DISPONIBLE</div> 
    <div class='titre-reunion' id='titre-reunion'>Salle libre</div> 
    <div class='horaires' id='horaires'></div> 
    <div class='organisateur' id='organisateur'></div> 
  </div> 
  
  <!-- Prochains événements --> 
  <div class='prochains'> 
    <h3>Prochains événements</h3> 
    <div id='liste-prochains'> 
      <p style='color:#6B7280;font-size:16px;'>Aucune réunion prévue</p> 
    </div> 
  </div> 
  
  <!-- Message réseau indisponible --> 
  <div class='hors-ligne' id='hors-ligne'>⚠ Réseau indisponible — Nouvelle 
tentative dans 30s</div> 
  
  <script src='kiosk.js'></script> 
</body> 
</html>
